# ==========================================================================
# Arithmetic Circuit Discovery Configuration — Phi-3-Mini-4K-Instruct
# ==========================================================================
# Phase 1: Bottom-up Fourier discovery of periodic number representations.
# Phase 3: SVD mask learning for arithmetic circuit identification.
#
# Model: microsoft/Phi-3-mini-4k-instruct (32L / 32H / d=3072)
# Architecture notes: SuRoPE, grouped-query attention, gated MLP (SwiGLU).
# ==========================================================================

experiment_name: arithmetic_circuit_discovery_phi3
seed: 42
use_wandb: false

# ---------- Model ----------
model:
  # Registry key from src/utils/model_registry.py
  key: "phi-3-mini"
  # TransformerLens name (used directly by train.py)
  name: "microsoft/Phi-3-mini-4k-instruct"
  pretrained_cache_dir: "~/.cache/huggingface/hub"
  # Use float16 for faster computation and lower memory usage.
  # Options: "float16", "bfloat16", "float32" (default).
  dtype: "float16"

# ---------- Data ----------
data_type: "arithmetic"
max_pad_length: 16  # arithmetic prompts are short

# Arithmetic-specific settings
arithmetic:
  # NOTE: multi-token answer handling is supported via _get_first_answer_token_ids
  # in train.py.  The training loss (KL divergence) does not depend on answer
  # tokens; the helper is only used for accuracy metrics.
  # 2500 pairs (50x50) with answers 0-98 (all single-token).
  # Rich carry/no-carry variation for mask learning.
  operand_range_start: 0
  operand_range_end: 50
  operation: "add"
  prompt_template: "{a} + {b} = "

# ---------- Fourier Discovery (Phase 1) ----------
fourier:
  # Token position to extract activations from
  position: "last"
  # Include post-layer residual streams (doubles memory)
  include_resid_post: false
  # Batch size for activation collection (lower for Phi-3's larger hidden dim)
  batch_size: 8
  # Store raw activations in results (needed for visualization)
  store_activations: true
  # Store full complex DFT (large, only if needed for detailed analysis)
  store_dft: false
  # Minimum power ratio to flag a head as significant
  head_power_ratio_threshold: 3.0
  # Layers to analyze (null = all layers)
  layers: null
  # Output directory for results
  output_dir: "fourier_results"

# ---------- Training (Phase 3 — mask learning) ----------
training:
  batch_size: 50
  num_epochs: 1
  device: null  # auto-detect: cuda > mps > cpu (override with --device CLI flag)

  # Optimizer hyperparameters (lower LR for larger model stability)
  learning_rate: 1.0e-2
  weight_decay: 0.0
  l1_weight: 2.0e-3
  temperature: 1.0

  # Learning rate scheduling
  eval_interval: 50
  patience: 5
  min_lr: 1e-6
  lr_factor: 0.5
  early_stopping: true
  save_checkpoints: true

  # Optimal stopping criteria
  kl_opt: 0.15
  l1_opt: 5000
  validation_interval: 20

# ---------- SVD Masking ----------
# train_masks: Skip QK for RoPE models (Phi-3 uses SuRoPE).  The masked
# forward pass uses cached full-model attention patterns for positional
# correctness.  OV + MLP masks are sufficient to identify the arithmetic
# circuit.  Phi-3 uses gated MLP (SwiGLU), so MLP_in / MLP_out masks
# apply to the gate and up projections respectively.
train_masks: ["OV", "MLP_in", "MLP_out"]

masking:
  mask_init_value: 0.5
  cache_svd: true
  warmup_steps: 0
  max_iterations_per_batch: 20
  sparsity_threshold: 1.0e-3

# ---------- Logging ----------
log_dir: "logs"

# ---------- Visualization ----------
visualization:
  plot_interval: 100
  log_gradients: false
  save_visualizations: true
  visualization_dir: "visualizations"
